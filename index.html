<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaussian / LogSumExp Visualizer Scaffold</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <canvas id="view" width="900" height="700"></canvas>
    <div class="controls">
      <div class="radio-group">
        <label>フィールドタイプ:</label>
        <div class="radio-options">
          <label class="radio-label">
            <input type="radio" name="fieldType" value="gaussian" checked>
            <span>Gaussian和</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="fieldType" value="ellipsoidMin">
            <span>楕円体 hard min</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="fieldType" value="ellipsoidLogSumExp">
            <span>楕円体 log-sum-exp</span>
          </label>
        </div>
      </div>
      
      <div class="slider-control" id="ellipsoidSControl">
        <label for="ellipsoidSSlider">半径 s:</label>
        <input type="range" id="ellipsoidSSlider" min="0.1" max="3.0" step="0.1" value="2.0">
        <span id="ellipsoidSValue">2.00</span>
      </div>
      
      <div class="slider-control" id="logSumExpKControl">
        <label for="logSumExpKSlider">log-sum-exp k:</label>
        <input type="range" id="logSumExpKSlider" min="0.01" max="1.5" step="0.01" value="0.5">
        <span id="logSumExpKValue">0.50</span>
      </div>
      
      <div class="slider-control">
        <label for="contourLevelsSlider">等値線レベル数:</label>
        <input type="range" id="contourLevelsSlider" min="1" max="20" step="1" value="10">
        <span id="contourLevelsValue">10</span>
      </div>
      
      <div class="slider-control">
        <label for="contourStepSlider">等値線間隔:</label>
        <input type="range" id="contourStepSlider" min="0.1" max="5.0" step="0.1" value="0.5">
        <span id="contourStepValue">0.50</span>
      </div>
      
      <div class="slider-control">
        <label for="gridStepSlider">サンプリング間隔:</label>
        <input type="range" id="gridStepSlider" min="1" max="10" step="1" value="4">
        <span id="gridStepValue">4</span>
      </div>
      
      <button id="randomizeButton" class="action-button">ガウシアンをランダム化</button>
      
      <div class="button-group">
        <button id="scaleDownButton" class="scale-button">-10%</button>
        <button id="scaleUpButton" class="scale-button">+10%</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
