<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaussian / LogSumExp Visualizer Scaffold</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="controls">
      <label for="fieldTypeSelect">フィールドタイプ:</label>
      <select id="fieldTypeSelect">
        <option value="gaussian">Gaussian和</option>
        <option value="ellipsoidSum">楕円体関数和</option>
        <option value="ellipsoidMin">楕円体 hard min</option>
        <option value="ellipsoidLogSumExp">楕円体 log-sum-exp</option>
      </select>
      
      <div class="slider-control" id="gaussianTauControl">
        <label for="gaussianTauSlider">Gaussian τ:</label>
        <input type="range" id="gaussianTauSlider" min="0.01" max="1.0" step="0.01" value="0.2">
        <span id="gaussianTauValue">0.20</span>
        <span class="note">(Gaussianモードのみ)</span>
      </div>
      
      <div class="slider-control" id="ellipsoidSControl">
        <label for="ellipsoidSSlider">楕円体 s:</label>
        <input type="range" id="ellipsoidSSlider" min="0.1" max="3.0" step="0.1" value="2.0">
        <span id="ellipsoidSValue">2.00</span>
        <span class="note">(楕円体モードのみ)</span>
      </div>
      
      <div class="slider-control" id="logSumExpKControl">
        <label for="logSumExpKSlider">log-sum-exp k:</label>
        <input type="range" id="logSumExpKSlider" min="0.1" max="20.0" step="0.1" value="5.0">
        <span id="logSumExpKValue">5.00</span>
        <span class="note">(log-sum-expモードのみ)</span>
      </div>
    </div>
    <canvas id="view" width="900" height="700"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
