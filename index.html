<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gaussian / LogSumExp Visualizer Scaffold</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <canvas id="view" width="900" height="700"></canvas>
    <button id="toggleControlsButton" class="toggle-controls-button" aria-label="Toggle controls">
      ⚙️ Settings
    </button>
    <div class="controls" id="controls">
      <div class="radio-group">
        <label>Field Type:</label>
        <div class="radio-options">
          <label class="radio-label">
            <input type="radio" name="fieldType" value="gaussian" checked autocomplete="off">
            <span>Gaussian Sum</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="fieldType" value="ellipsoidLogSumExp" autocomplete="off">
            <span>Ellipsoid Log-Sum-Exp</span>
          </label>
        </div>
      </div>
      
      <div class="slider-control" id="ellipsoidSControl">
        <div class="slider-label-row">
          <label for="ellipsoidSSlider">Radius s:</label>
          <span id="ellipsoidSValue">2.00</span>
        </div>
        <input type="range" id="ellipsoidSSlider" min="0.01" max="3.0" step="0.01" value="2.0">
      </div>

      <div class="slider-control" id="gaussianTauControl">
        <div class="slider-label-row">
          <label for="gaussianTauSlider">τ (threshold):</label>
          <span id="gaussianTauValue">0.135</span>
        </div>
        <input type="range" id="gaussianTauSlider" min="0.001" max="5.0" step="0.001" value="0.135">
      </div>
      
      <div class="slider-control" id="logSumExpKControl">
        <div class="slider-label-row">
          <label for="logSumExpKSlider">Log-Sum-Exp k:</label>
          <span id="logSumExpKValue">0.50</span>
        </div>
        <input type="range" id="logSumExpKSlider" min="0.01" max="1.5" step="0.01" value="0.5">
      </div>
      
      <div class="slider-control">
        <div class="slider-label-row">
          <label for="contourLevelsSlider">Contour Levels:</label>
          <span id="contourLevelsValue">1</span>
        </div>
        <input type="range" id="contourLevelsSlider" min="1" max="20" step="1" value="1">
      </div>
      
      <div class="slider-control">
        <div class="slider-label-row">
          <label for="contourStepSlider">Contour Step:</label>
          <span id="contourStepValue">0.10</span>
        </div>
        <input type="range" id="contourStepSlider" min="0.1" max="5.0" step="0.1" value="0.1">
      </div>
      
      <div class="slider-control">
        <div class="slider-label-row">
          <label for="gridStepSlider">Grid Step:</label>
          <span id="gridStepValue">4</span>
        </div>
        <input type="range" id="gridStepSlider" min="1" max="10" step="1" value="4">
      </div>
      
      <div class="checkbox-control">
        <label class="checkbox-label">
          <input type="checkbox" id="showHeatmapCheckbox" checked>
          <span>Show Heatmap</span>
        </label>
      </div>
      
      <div class="checkbox-control">
        <label class="checkbox-label">
          <input type="checkbox" id="showCombinedContoursCheckbox" checked>
          <span>Show Combined Contours</span>
        </label>
      </div>
      
      <div class="checkbox-control">
        <label class="checkbox-label">
          <input type="checkbox" id="showIndividualCheckbox">
          <span>Show Individual Contours</span>
        </label>
      </div>
      
      <div class="slider-control">
        <div class="slider-label-row">
          <label for="gaussianCountSlider">Gaussian Count:</label>
          <span id="gaussianCountValue">50</span>
        </div>
        <input type="range" id="gaussianCountSlider" min="1" max="200" step="1" value="3">
      </div>
      
      <button id="randomizeButton" class="action-button">Randomize Gaussians</button>
      
      <div class="button-group">
        <button id="scaleDownButton" class="scale-button">-10%</button>
        <button id="scaleUpButton" class="scale-button">+10%</button>
      </div>
    </div>
  </div>

  <script src="field-math.js"></script>
  <script src="renderer.js"></script>
  <script src="main.js"></script>
</body>
</html>
